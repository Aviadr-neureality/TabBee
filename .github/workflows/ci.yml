name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint + Unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Chrome MV3 manifest validation
  # ─────────────────────────────────────────────────────────────────────────────
  validate-extension:
    name: Validate Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest (Chrome MV3)
        # Custom validator: checks manifest fields, referenced files exist,
        # Chrome permissions, and service worker JS syntax.
        # Replaces web-ext lint which is a Firefox-focused tool and emits
        # errors/warnings that don't apply to Chrome-only extensions.
        run: npm run validate
