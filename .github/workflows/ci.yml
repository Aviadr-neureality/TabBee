name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint + Unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Extension manifest validation (web-ext lint)
  # ─────────────────────────────────────────────────────────────────────────────
  validate-extension:
    name: Validate Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Lint extension (web-ext)
        # Validates manifest.json and flags MV3 issues.
        # BACKGROUND_SERVICE_WORKER_NOFALLBACK is Firefox-only: Chrome MV3
        # service workers don't need a scripts fallback, so we skip that code.
        # MISSING_DATA_COLLECTION_PERMISSIONS is also Firefox-only.
        run: >
          web-ext lint
          --source-dir .
          --ignore-files "node_modules/**" "tests/**" "coverage/**"
            "jest*.js" ".eslintrc.json" "package*.json"
          --ignore-errors
            BACKGROUND_SERVICE_WORKER_NOFALLBACK
            MISSING_DATA_COLLECTION_PERMISSIONS
